services:
  # -------------------------
  # Kafka (KRaft, single node)
  # -------------------------
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 60

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic claims_raw       --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic claims_decisions --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic claims_outcomes  --partitions 1 --replication-factor 1;
      echo 'Kafka topics ensured.';
      "

  # -------------------------
  # Storage
  # -------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  # -------------------------
  # MLflow
  # -------------------------
  mlflow:
    build: ./mlflow
    image: insurance-claims-rtml-mlflow
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --serve-artifacts
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      --artifacts-destination s3://mlflow/
    ports:
      - "5000:5000"

  # -------------------------
  # ClickHouse (auto-init schema)
  # -------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_USER: adrian
      CLICKHOUSE_PASSWORD: adrian123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d
    depends_on:
      kafka:
        condition: service_healthy

  # -------------------------
  # Superset (ClickHouse ready)
  # -------------------------
  superset:
    build: ./superset
    image: insurance-claims-rtml-superset
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: dev_secret_key_change_me
      SUPERSET__SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://mlflow:mlflow@postgres:5432/superset
    ports:
      - "8088:8088"
    command: >
      /bin/bash -lc "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin123 || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "

  # -------------------------
  # Inference API (this creates inference_logs)
  # -------------------------
  inference-api:
    build:
      context: .
      dockerfile: inference/Dockerfile
    image: insurance-claims-rtml-inference
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: adrian
      CLICKHOUSE_PASSWORD: adrian123
      CLICKHOUSE_DB: default

      KAFKA_BOOTSTRAP: kafka:9092
      DECISIONS_TOPIC: claims_decisions

      MLFLOW_TRACKING_URI: http://mlflow:5000
      FEAST_REPO: /app/feature_store
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./data:/app/data
      - ./feature_store:/app/feature_store/
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_started
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      redis:
        condition: service_started

  feast-apply:
    image: insurance-claims-rtml-inference
    depends_on:
      redis:
        condition: service_started
    environment:
      FEAST_REPO: /app/feature_store
    volumes:
      - ./feature_store:/app/feature_store
    entrypoint: [ "/bin/sh","-lc" ]
    command: >
      "cd /app/feature_store && feast apply && echo 'feast apply done'"
    

  # Optional: hit the API repeatedly to populate inference_logs
  inference-loadgen:
    image: curlimages/curl:8.6.0
    depends_on:
      inference-api:
        condition: service_started
    volumes:
      - ./loadgen.sh:/loadgen.sh:ro
    entrypoint: [ "/bin/sh","/loadgen.sh" ]
    profiles: ["load"]



  events-writer:
    build:
      context: .
      dockerfile: inference/Dockerfile
    image: insurance-claims-rtml-inference
    command: python events_writer.py
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: adrian
      CLICKHOUSE_PASSWORD: adrian123
      CLICKHOUSE_DB: default
      KAFKA_BOOTSTRAP: kafka:9092
      DECISIONS_TOPIC: claims_decisions
      OUTCOMES_TOPIC: claims_outcomes
      EVENTS_WRITER_GROUP: events-writer-v4
    depends_on:
      clickhouse:
        condition: service_started
      kafka:
        condition: service_healthy

  # -------------------------
  # Simulators (produce outcomes/decisions)
  # -------------------------
  claims-generator:
    build: ./simulator
    image: insurance-claims-rtml-sim
    command: python generate_claims.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      CLAIMS_TOPIC: claims_raw
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["sim"]


  decision-simulator:
    build: ./simulator
    image: insurance-claims-rtml-sim
    command: python decision_simulator.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DECISIONS_TOPIC: claims_decisions
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["sim"]

  outcome-simulator:
    build: ./simulator
    image: insurance-claims-rtml-sim
    command: python outcome_simulator_from_decisions.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DECISIONS_TOPIC: claims_decisions
      OUTCOMES_TOPIC: claims_outcomes
      OUTCOME_MIN_DELAY_SEC: "3"
      OUTCOME_MAX_DELAY_SEC: "20"
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["sim"]

volumes:
  kafka_data:
  minio_data:
  pg_data:
  ch_data: