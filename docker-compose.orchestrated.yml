services:
  # -------------------------
  # Spark (local cluster)
  # -------------------------
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-ubuntu
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "--host",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080"
      ]
    ports:
      - "7077:7077"
      - "8081:8080"
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1-scala2.12-java17-ubuntu
    depends_on:
      - spark-master
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
        "--webui-port",
        "8081"
      ]
    ports:
      - "8082:8081"
    restart: unless-stopped

  # -------------------------
  # Streaming feature builder (always-on)
  # runs build_gold_features.py (streaming)
  # -------------------------
  gold-feature-stream:
    image: apache/spark:3.5.1-python3
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      INPUT_TOPIC: claims_raw
      OUTPUT_PATH: /opt/project/data/gold_features
      CHECKPOINT: /opt/project/data/checkpoints/gold_features
    command: >
      bash -lc "
        /opt/spark/bin/spark-submit
        --master spark://spark-master:7077
        build_gold_features.py
      "
    restart: unless-stopped

  # -------------------------
  # Kafka -> ClickHouse writer (always-on)
  # runs events_writer.py consumer
  # -------------------------
  events-writer:
    build: ./simulator
    image: insurance-claims-rtml-sim
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_started
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: adrian
      CLICKHOUSE_PASSWORD: adrian123
      CLICKHOUSE_DB: default
      RAW_TOPIC: claims_raw
      DECISIONS_TOPIC: claims_decisions
      OUTCOMES_TOPIC: claims_outcomes
    command: python events_writer.py
    restart: unless-stopped

  # -------------------------
  # Orchestrator (schedules Feast + training + promotion)
  # -------------------------
  orchestrator:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      mlflow:
        condition: service_started
      spark-master:
        condition: service_started
    volumes:
      - ./:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /opt/project
    environment:
      FEAST_REPO: /opt/project
      REDIS_HOST: redis

      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: claims-approval-model

      MATERIALIZE_LOOKBACK_MINUTES: "120"
      MATERIALIZE_EVERY_MINUTES: "60"
      TRAIN_AT_UTC_HOUR: "2"
      TRAIN_AT_UTC_MINUTE: "0"

      SPARK_MASTER: spark://spark-master:7077
    command: python orchestration/orchestrator.py
    restart: unless-stopped